<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>SEDOGIN INC. | Global System Interface</title>
    <meta name="title" content="SEDOGIN INC. | Global System Interface">
    <meta name="description" content="Official website of Sedogin INC. Discover Sedvai, an advanced, locally-processed AI assistant engineered for secure desktop automation and high-performance workflow integration.">
    <meta name="keywords" content="Sedogin INC, Sedvai, AI assistant, local AI, artificial intelligence, desktop automation, secure software">
    <meta name="author" content="Sedogin INC">
    <link rel="canonical" href="https://sedogin.com/">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://sedogin.com/">
    <meta property="og:title" content="SEDOGIN INC. | Global System Interface">
    <meta property="og:description" content="Official website of Sedogin INC. Discover Sedvai, an advanced, locally-processed AI assistant engineered for secure desktop automation.">
    <meta property="og:image" content="https://sedogin.com/logo.png">

    <link rel="icon" type="image/png" sizes="32x32" href="logo.png">
    <link rel="icon" type="image/png" sizes="16x16" href="logo.png">
    <link rel="apple-touch-icon" href="logo.png">
    <link rel="shortcut icon" href="logo.png">

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #00f2ff;
            --glow-secondary: #00d2ee;
            --bg-dark: #0a0a0b;
            --panel-bg: rgba(10, 10, 15, 0.95);
            --border-glow: 0 0 15px rgba(0, 242, 255, 0.4);
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg-dark);
            color: white;
            overflow: hidden;
        }

        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -2;
        }

        .hud-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: -1;
            overflow: hidden;
        }

        .hud-corner {
            position: absolute;
            width: 150px;
            height: 150px;
            border: 2px solid rgba(0, 242, 255, 0.15);
        }

        .hud-top-left {
            top: 30px; left: 30px;
            border-right: none; border-bottom: none;
        }

        .hud-bottom-right {
            bottom: 30px; right: 30px;
            border-left: none; border-top: none;
        }

        .hud-ring {
            position: absolute;
            right: 5%;
            top: 20%;
            width: 300px;
            height: 300px;
            border: 1px dashed rgba(0, 242, 255, 0.1);
            border-radius: 50%;
            animation: spin 30s linear infinite;
        }

        .hud-ring::before {
            content: '';
            position: absolute;
            top: 20px; left: 20px; right: 20px; bottom: 20px;
            border: 1px solid rgba(0, 242, 255, 0.2);
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin-reverse 20s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes spin-reverse { 100% { transform: rotate(-360deg); } }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0d0d0f; }
        ::-webkit-scrollbar-thumb { background: rgba(0, 242, 255, 0.2); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary-color); box-shadow: var(--border-glow); }

        .main-frame {
            display: flex;
            flex-direction: column;
            height: 100vh;
            border: 1px solid rgba(0, 242, 255, 0.1);
            box-sizing: border-box;
            backdrop-filter: blur(2px);
        }

        header {
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0, 242, 255, 0.2);
            background: rgba(10, 10, 15, 0.8);
            flex-shrink: 0;
            z-index: 10;
        }

        @keyframes pulseGlow {
            0%, 100% { text-shadow: 0 0 15px rgba(0, 242, 255, 0.4); }
            50% { text-shadow: 0 0 25px rgba(0, 242, 255, 0.8), 0 0 5px rgba(0, 242, 255, 0.5); }
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 5px;
            color: var(--primary-color);
            animation: pulseGlow 3s infinite;
        }

        nav { display: flex; gap: 20px; }

        .nav-btn {
            background: none;
            border: 1px solid transparent;
            color: #777;
            padding: 8px 15px;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            font-size: 12px;
            letter-spacing: 1px;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .nav-btn.active {
            color: var(--primary-color);
            border-bottom: 2px solid var(--primary-color);
            text-shadow: var(--border-glow);
        }

        .nav-btn:hover:not(.active) { color: white; }

        .content-area {
            flex-grow: 1;
            padding: 40px;
            overflow-y: auto;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            z-index: 5;
        }

        .panel {
            background: var(--panel-bg);
            border: 1px solid rgba(0, 242, 255, 0.1);
            border-left: 4px solid var(--primary-color);
            padding: 40px;
            max-width: 900px;
            width: 100%;
            box-shadow: var(--border-glow);
            animation: fadeIn 0.8s ease-out;
            position: relative;
            overflow: hidden;
        }

        .panel::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: rgba(0, 242, 255, 0.4);
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.8);
            animation: scanline 6s linear infinite;
            opacity: 0.5;
            pointer-events: none;
        }

        @keyframes scanline {
            0% { top: -10px; opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.5; }
            100% { top: 100%; opacity: 0; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 { font-family: 'Orbitron', sans-serif; color: var(--primary-color); margin-top: 0; font-size: 26px; }
        p { line-height: 1.8; color: #ccc; font-size: 14px; }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .center-logo {
            display: block;
            margin: 20px auto;
            max-width: 180px;
            filter: drop-shadow(0 0 15px rgba(0, 242, 255, 0.5));
            animation: float 4s ease-in-out infinite;
        }

        .app-card {
            background: rgba(0, 242, 255, 0.02);
            border: 1px solid rgba(0, 242, 255, 0.1);
            border-left: 3px solid var(--primary-color);
            padding: 25px;
            margin-top: 25px;
            position: relative;
            transition: 0.3s;
        }
        
        .app-card:hover {
            box-shadow: inset 0 0 20px rgba(0, 242, 255, 0.05);
            border-color: rgba(0, 242, 255, 0.3);
        }

        .app-card h2 {
            font-family: 'Orbitron', sans-serif;
            color: #fff;
            font-size: 20px;
            margin-top: 0;
            letter-spacing: 2px;
        }

        .tech-btn {
            background: transparent;
            color: var(--primary-color);
            border: 1px solid var(--primary-color);
            padding: 10px 25px;
            font-family: 'Orbitron', sans-serif;
            font-size: 12px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
            text-decoration: none;
            display: inline-block;
            margin-top: 15px;
        }

        .tech-btn:hover {
            background: var(--primary-color);
            color: #000;
            box-shadow: var(--border-glow);
        }

        .tech-input {
            background: rgba(0, 242, 255, 0.03);
            border: 1px solid rgba(0, 242, 255, 0.15);
            color: #fff;
            padding: 12px;
            width: 100%;
            box-sizing: border-box;
            margin-bottom: 15px;
            font-family: 'Roboto', sans-serif;
            font-size: 14px;
            transition: 0.3s;
        }

        .tech-input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: inset 0 0 10px rgba(0, 242, 255, 0.1);
        }

        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        details { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(0, 242, 255, 0.1); border-radius: 4px; padding: 15px; transition: 0.3s; }
        details[open] { border-color: var(--primary-color); background: rgba(0, 242, 255, 0.05); box-shadow: inset 0 0 15px rgba(0, 242, 255, 0.05); }
        summary { font-family: 'Orbitron', sans-serif; font-size: 14px; color: var(--primary-color); cursor: pointer; list-style: none; outline: none; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        summary:hover { text-shadow: var(--border-glow); }
        summary::-webkit-details-marker { display: none; }
        .legal-text { margin-top: 15px; font-size: 13px; color: #aaa; white-space: pre-line; max-height: 250px; overflow-y: auto; padding-right: 10px; }

        footer { padding: 10px 40px; font-size: 10px; color: #444; text-align: right; border-top: 1px solid rgba(0, 242, 255, 0.1); background: rgba(10, 10, 15, 0.9); z-index: 10; }
        .status-dot { height: 7px; width: 7px; background-color: #00ff00; border-radius: 50%; display: inline-block; margin-right: 6px; box-shadow: 0 0 8px #00ff00; }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>
    
    <div class="hud-overlay">
        <div class="hud-corner hud-top-left"></div>
        <div class="hud-corner hud-bottom-right"></div>
        <div class="hud-ring"></div>
    </div>

    <div class="main-frame">
        <header>
            <div class="logo">SEDOGIN INC.</div>
            <nav>
                <button class="nav-btn active" onclick="showSection('main')">Home</button>
                <button class="nav-btn" onclick="showSection('apps')">Our Applications</button>
                <button class="nav-btn" onclick="showSection('info')">Information</button>
            </nav>
        </header>

        <main class="content-area">
            <section id="content-display" class="panel">
                </section>
        </main>

        <footer>
            © 2026 SEDOGIN INC. | ALL RIGHTS RESERVED
        </footer>
    </div>

    <script>
        const sections = {
            main: {
                title: "SEDOGIN INC. CORE",
                content: `<img src="logo.png" alt="Sedogin Emblem" class="center-logo" onerror="this.style.display='none'">
                          <p>Welcome to the central project management interface. This hub serves as the nexus for our development tracks, financial planning, and strategic AI deployment.</p>
                          <div style="margin-top: 20px;"><span class="status-dot"></span> Core System Operational</div>`
            },
            apps: {
                title: "OUR APPLICATIONS",
                content: `<p>Explore our proprietary software solutions. All applications are built with a focus on high performance, secure local processing, and seamless system integration.</p>
                          
                          <div class="app-card">
                              <h2>SEDVAI</h2>
                              <p>Sedvai is an advanced, locally-processed AI assistant engineered by Sedogin INC. Designed to operate directly on your hardware, it executes complex voice commands, automates desktop workflows, and securely interfaces with external APIs. By processing commands locally, Sedvai guarantees maximum data privacy and operational efficiency without relying on constant cloud connections.</p>
                              
                              <a href="#" class="tech-btn" onclick="event.preventDefault(); alert('Transmission simulated: Deployment link is currently unavailable. Stand by for future updates.');">DOWNLOAD SEDVAI</a>
                          </div>
                          
                          <div style="margin-top: 20px;"><span class="status-dot"></span> Deployment Sector Online</div>`
            },
            info: {
                title: "INFORMATION HUB",
                content: `<p>Official documentation and legal compliance directory for Sedogin INC. projects.</p>
                <div class="info-grid">
                    <details>
                        <summary>Privacy Policy</summary>
                        <div class="legal-text">Privacy Policy for Sedvai (by Sedogin INC)
Last Updated: March 2026

1. Overview
Sedogin INC ("we," "our," or "us") is committed to protecting your privacy. This Privacy Policy explains how Sedvai collects and uses information when you use our application and website.

2. Data Collection
- Local Processing: Sedvai is designed to process voice commands and scripts locally on your device. We do not upload your private voice recordings to our servers.
- System Access: To function, Sedvai requires access to your microphone and system controls (volume, brightness, applications). This access is used strictly to execute your commands.
- Analytics: We may collect anonymous technical data (e.g., app version, crash reports) to improve performance. This data does not identify you personally.

3. Third-Party Services
If you connect external AI models (like OpenAI or Groq) via API keys, your data is subject to the privacy policies of those providers. Sedogin INC does not store your API keys on its own servers; they are stored locally in your encrypted app settings.

4. Your Rights
You have the right to revoke microphone and system permissions at any time through your Windows settings.</div>
                    </details>
                    <details>
                        <summary>Terms of Use</summary>
                        <div class="legal-text">Terms of Service for Sedvai
Last Updated: March 2026

1. Acceptance of Terms
By downloading or using Sedvai, provided by Sedogin INC, you agree to be bound by these Terms of Service.

2. License to Use
We grant you a personal, non-exclusive, non-transferable license to use Sedvai for personal or professional purposes. You may not reverse-engineer, decompile, or attempt to extract the source code of the application without official permission from Sedogin INC.

3. "As Is" Warranty
Sedvai is provided "AS IS" and "AS AVAILABLE." While we strive for perfection (Mark-8.5 and beyond), Sedogin INC is not responsible for any system errors, data loss, or hardware issues that may occur during the use of the software. Use it at your own risk.

4. User Conduct
You agree not to use Sedvai for any illegal activities, including unauthorized access to computer systems or the creation of harmful scripts.

5. Updates
Sedogin INC reserves the right to update the software and modify these terms at any time to reflect changes in technology or law.</div>
                    </details>
                </div>
                
                <hr style="border: 0; border-top: 1px solid rgba(0, 242, 255, 0.1); margin: 30px 0;">
                
                <h2 style="font-family: 'Orbitron', sans-serif; color: var(--primary-color); font-size: 18px; margin-bottom: 15px;">SUPPORT PROTOCOL</h2>
                <form onsubmit="event.preventDefault(); alert('Signal intercepted. The message gateway is currently offline for maintenance. Emails will be routed in future updates.');">
                    <input type="text" class="tech-input" placeholder="Identification (Name)" required>
                    <input type="email" class="tech-input" placeholder="Return Vector (Email Address)" required>
                    <textarea class="tech-input" placeholder="Message Protocol (Enter your request)" rows="4" required></textarea>
                    <button type="submit" class="tech-btn">TRANSMIT DATA</button>
                </form>
                `
            }
        };

        function showSection(name) {
            const data = sections[name];
            const display = document.getElementById('content-display');
            
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('active');
                if(btn.innerText.toLowerCase() === name || 
                  (name === 'apps' && btn.innerText.toLowerCase() === 'our applications') ||
                  (name === 'main' && btn.innerText.toLowerCase() === 'home')) {
                    btn.classList.add('active');
                }
            });

            display.style.opacity = 0;
            setTimeout(() => {
                display.innerHTML = `<h1>${data.title}</h1>${data.content}`;
                display.style.opacity = 1;
                document.querySelector('.content-area').scrollTop = 0;
            }, 200);
        }

        showSection('main');

        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        let particles = [];
        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 0.4;
                this.vy = (Math.random() - 0.5) * 0.4;
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
            }
            draw() {
                ctx.fillStyle = 'rgba(0, 242, 255, 0.3)';
                ctx.beginPath(); ctx.arc(this.x, this.y, 1.5, 0, Math.PI * 2); ctx.fill();
            }
        }
        for (let i = 0; i < 70; i++) particles.push(new Particle());
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, i) => {
                p.update(); p.draw();
                for (let j = i; j < particles.length; j++) {
                    const d = Math.sqrt((p.x - particles[j].x)**2 + (p.y - particles[j].y)**2);
                    if (d < 120) {
                        ctx.strokeStyle = `rgba(0, 242, 255, ${0.1 * (1 - d/120)})`;
                        ctx.lineWidth = 0.5;
                        ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(particles[j].x, particles[j].y); ctx.stroke();
                    }
                }
            });
            requestAnimationFrame(animate);
        }
        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
        animate();
    </script>
</body>
</html>
