<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">

    <link rel="icon" href="logo.png" type="image/png">
    <link rel="shortcut icon" href="logo.png">
    
    <title>SEDOGIN INC. | Global System Interface</title>
    <meta name="title" content="SEDOGIN INC. | Global System Interface">
    <meta name="description" content="Official website of Sedogin INC. Discover Sedvai, an advanced, locally-processed AI assistant engineered for secure desktop automation and high-performance workflow integration.">
    <meta name="keywords" content="Sedogin INC, Sedvai, AI assistant, local AI, artificial intelligence, desktop automation, secure software">
    <meta name="author" content="Sedogin INC">
    <link rel="canonical" href="https://sedogin.com/">

    <meta property="og:type" content="website">
    <meta property="og:url" content="https://sedogin.com/">
    <meta property="og:title" content="SEDOGIN INC. | Global System Interface">
    <meta property="og:description" content="Official website of Sedogin INC. Discover Sedvai, an advanced, locally-processed AI assistant engineered for secure desktop automation.">
    <meta property="og:image" content="https://sedogin.com/logo.png">

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400&family=Fira+Code:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #00f2ff;
            --glow-secondary: #00d2ee;
            --bg-dark: #0a0a0b;
            --panel-bg: rgba(10, 10, 15, 0.95);
            --border-glow: 0 0 15px rgba(0, 242, 255, 0.4);
        }

        *, *::before, *::after { box-sizing: border-box; }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg-dark);
            color: white; overflow: hidden;
        }

        #bg-canvas { position: fixed; top: 0; left: 0; z-index: -2; }

        .hud-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none; z-index: -1; overflow: hidden;
        }
        .hud-corner {
            position: absolute; width: 150px; height: 150px;
            border: 2px solid rgba(0, 242, 255, 0.15);
        }
        .hud-top-left { top: 30px; left: 30px; border-right: none; border-bottom: none; }
        .hud-bottom-right { bottom: 30px; right: 30px; border-left: none; border-top: none; }
        .hud-ring {
            position: absolute; right: 5%; top: 20%;
            width: 300px; height: 300px;
            border: 1px dashed rgba(0, 242, 255, 0.1);
            border-radius: 50%; animation: spin 40s linear infinite;
        }
        .hud-ring::before {
            content: ''; position: absolute;
            top: 20px; left: 20px; right: 20px; bottom: 20px;
            border: 1px solid rgba(0, 242, 255, 0.2);
            border-radius: 50%; border-top-color: transparent;
            animation: spin-reverse 20s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes spin-reverse { 100% { transform: rotate(-360deg); } }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0d0d0f; }
        ::-webkit-scrollbar-thumb { background: rgba(0, 242, 255, 0.2); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary-color); box-shadow: var(--border-glow); }

        .main-frame {
            display: flex; flex-direction: column; height: 100vh;
            border: 1px solid rgba(0, 242, 255, 0.1);
            backdrop-filter: blur(2px);
        }

        header {
            padding: 15px 40px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid rgba(0, 242, 255, 0.2);
            background: rgba(10, 10, 15, 0.8);
            flex-shrink: 0; z-index: 10;
        }

        @keyframes pulseGlow {
            0%, 100% { text-shadow: 0 0 15px rgba(0, 242, 255, 0.4); }
            50% { text-shadow: 0 0 25px rgba(0, 242, 255, 0.8), 0 0 5px rgba(0, 242, 255, 0.5); }
        }

        .logo {
            font-family: 'Orbitron', sans-serif; font-size: 22px; font-weight: bold;
            letter-spacing: 5px; color: var(--primary-color);
            animation: pulseGlow 3s infinite; white-space: nowrap;
        }

        /* Hamburger button */
        .hamburger {
            display: none;
            flex-direction: column; justify-content: center; align-items: center;
            gap: 5px; cursor: pointer; padding: 8px;
            background: none; border: 1px solid rgba(0, 242, 255, 0.3);
            width: 44px; height: 44px;
        }
        .hamburger span {
            display: block; width: 22px; height: 2px;
            background: var(--primary-color); transition: all 0.3s ease;
        }
        .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
        .hamburger.open span:nth-child(2) { opacity: 0; }
        .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

        nav { display: flex; gap: 20px; }
        .nav-btn {
            background: none; border: 1px solid transparent; color: #777;
            padding: 8px 15px; cursor: pointer; font-family: 'Orbitron', sans-serif;
            font-size: 12px; letter-spacing: 1px; transition: 0.3s; text-transform: uppercase;
            white-space: nowrap;
        }
        .nav-btn.active { color: var(--primary-color); border-bottom: 2px solid var(--primary-color); text-shadow: var(--border-glow); }
        .nav-btn:hover:not(.active) { color: white; }

        /* Mobile nav */
        .mobile-nav {
            display: none; flex-direction: column;
            background: rgba(10, 10, 15, 0.98);
            border-bottom: 1px solid rgba(0, 242, 255, 0.2);
            z-index: 9; flex-shrink: 0;
        }
        .mobile-nav.open { display: flex; }
        .mobile-nav .nav-btn {
            padding: 14px 40px;
            border-bottom: 1px solid rgba(0, 242, 255, 0.08);
            text-align: left; width: 100%;
        }

        .content-area {
            flex-grow: 1; padding: 40px; overflow-y: auto;
            display: flex; justify-content: center; align-items: flex-start; z-index: 5;
        }

        .panel {
            background: var(--panel-bg); border: 1px solid rgba(0, 242, 255, 0.1);
            border-left: 4px solid var(--primary-color); padding: 40px;
            max-width: 900px; width: 100%; box-shadow: var(--border-glow);
            animation: fadeIn 0.8s ease-out; position: relative; overflow: hidden;
        }
        .panel::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 2px;
            background: rgba(0, 242, 255, 0.4); box-shadow: 0 0 10px rgba(0, 242, 255, 0.8);
            animation: scanline 6s linear infinite; opacity: 0.5; pointer-events: none;
        }

        @keyframes scanline {
            0% { top: -10px; opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.5; }
            100% { top: 100%; opacity: 0; }
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        h1 { font-family: 'Orbitron', sans-serif; color: var(--primary-color); margin-top: 0; font-size: 26px; }
        p { line-height: 1.8; color: #ccc; font-size: 14px; }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .center-logo {
            display: block; margin: 0 auto 20px auto; max-width: 140px;
            filter: drop-shadow(0 0 15px rgba(0, 242, 255, 0.5));
            animation: float 4s ease-in-out infinite;
        }

        /* Dashboard */
        .dash-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin: 25px 0;
        }
        .dash-item {
            background: rgba(0, 242, 255, 0.03); border: 1px solid rgba(0, 242, 255, 0.1);
            padding: 15px; text-align: center; transition: 0.3s;
        }
        .dash-item:hover { background: rgba(0, 242, 255, 0.08); box-shadow: inset 0 0 10px rgba(0, 242, 255, 0.1); }
        .dash-val { font-family: 'Orbitron', sans-serif; color: var(--primary-color); font-size: 18px; display: block; }
        .dash-label { font-size: 10px; color: #555; text-transform: uppercase; letter-spacing: 1px; }

        /* Terminal */
        .log-window {
            background: #000; border: 1px solid #1a1a1a; padding: 15px;
            font-family: 'Fira Code', monospace; font-size: 12px; color: #00ff00;
            height: 140px; overflow-y: auto; margin-top: 25px; position: relative;
            box-shadow: inset 0 0 10px rgba(0, 255, 0, 0.05); display: flex; flex-direction: column;
        }
        .log-line { margin-bottom: 5px; opacity: 0.9; }
        .log-window::-webkit-scrollbar { width: 4px; }
        .log-window::-webkit-scrollbar-thumb { background: #333; }

        /* App cards */
        .app-card {
            background: rgba(0, 242, 255, 0.02); border: 1px solid rgba(0, 242, 255, 0.1);
            border-left: 3px solid var(--primary-color); padding: 25px; margin-top: 25px;
            position: relative; transition: 0.3s;
        }
        .app-card:hover { box-shadow: inset 0 0 20px rgba(0, 242, 255, 0.05); border-color: rgba(0, 242, 255, 0.3); }
        .app-card h2 { font-family: 'Orbitron', sans-serif; color: #fff; font-size: 20px; margin-top: 0; letter-spacing: 2px; }

        .app-card-meta {
            display: flex; align-items: center; gap: 12px; margin-bottom: 14px; flex-wrap: wrap;
        }
        .app-type-badge {
            font-family: 'Orbitron', sans-serif; font-size: 10px; letter-spacing: 2px;
            color: #000; background: var(--primary-color); padding: 3px 10px;
            text-transform: uppercase;
        }
        .app-status-badge {
            font-family: 'Fira Code', monospace; font-size: 11px; letter-spacing: 1px;
            color: #ffaa00; border: 1px solid #ffaa00; padding: 3px 10px;
            text-transform: uppercase; animation: statusPulse 2s infinite;
        }
        @keyframes statusPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.45; }
        }

        /* Buttons */
        .tech-btn {
            background: transparent; color: var(--primary-color); border: 1px solid var(--primary-color);
            padding: 10px 25px; font-family: 'Orbitron', sans-serif; font-size: 12px;
            cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s;
            text-decoration: none; display: inline-block; margin-top: 15px;
        }
        .tech-btn:hover { background: var(--primary-color); color: #000; box-shadow: var(--border-glow); }

        .store-btn {
            background: #000; color: var(--primary-color); border: 1px solid var(--primary-color);
            padding: 10px 25px; font-family: 'Orbitron', sans-serif; font-size: 12px;
            cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: all 0.3s ease;
            text-decoration: none; display: inline-flex; align-items: center; gap: 10px; margin-top: 15px;
        }
        .store-btn:hover { background: var(--primary-color); color: #fff; box-shadow: var(--border-glow); }
        .store-btn:hover .store-icon path { fill: #fff; }
        .store-icon { width: 16px; height: 16px; flex-shrink: 0; }
        .store-icon path { fill: var(--primary-color); transition: fill 0.3s; }

        .status-dot { height: 7px; width: 7px; background-color: #00ff00; border-radius: 50%; display: inline-block; margin-right: 6px; box-shadow: 0 0 8px #00ff00; }

        /* Info grid */
        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        details { background: rgba(255,255,255,0.02); border: 1px solid rgba(0,242,255,0.1); border-radius: 4px; padding: 15px; transition: 0.3s; }
        details[open] { border-color: var(--primary-color); background: rgba(0,242,255,0.05); box-shadow: inset 0 0 15px rgba(0,242,255,0.05); }
        summary { font-family: 'Orbitron', sans-serif; font-size: 14px; color: var(--primary-color); cursor: pointer; list-style: none; outline: none; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        summary:hover { text-shadow: var(--border-glow); }
        summary::-webkit-details-marker { display: none; }
        .legal-text { margin-top: 15px; font-size: 13px; color: #aaa; white-space: pre-line; max-height: 250px; overflow-y: auto; padding-right: 10px; }

        .tech-input {
            background: rgba(0,242,255,0.03); border: 1px solid rgba(0,242,255,0.15);
            color: #fff; padding: 12px; width: 100%; margin-bottom: 15px;
            font-family: 'Roboto', sans-serif; font-size: 14px; transition: 0.3s;
        }
        .tech-input:focus { outline: none; border-color: var(--primary-color); box-shadow: inset 0 0 10px rgba(0,242,255,0.1); }

        /* ===== TEAM ===== */
        .team-grid {
            display: grid; grid-template-columns: repeat(2, 1fr);
            gap: 20px; margin-top: 30px;
        }
        .team-card {
            background: rgba(0,242,255,0.02);
            border: 1px solid rgba(0,242,255,0.1);
            border-top: 3px solid var(--primary-color);
            padding: 25px; position: relative; transition: 0.3s; overflow: hidden;
        }
        .team-card::before {
            content: ''; position: absolute;
            top: 0; left: -100%; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0,242,255,0.03), transparent);
            transition: left 0.6s ease;
        }
        .team-card:hover::before { left: 100%; }
        .team-card:hover { border-color: rgba(0,242,255,0.4); box-shadow: inset 0 0 20px rgba(0,242,255,0.05), var(--border-glow); }

        .team-card-icon {
            width: 46px; height: 46px;
            border: 1px solid var(--primary-color);
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 15px; font-size: 20px; color: var(--primary-color);
        }
        .team-role {
            font-family: 'Fira Code', monospace; font-size: 11px; letter-spacing: 2px;
            color: var(--primary-color); text-transform: uppercase; margin-bottom: 8px; display: block;
        }
        .team-title {
            font-family: 'Orbitron', sans-serif; font-size: 15px;
            color: #fff; margin: 0 0 12px 0; letter-spacing: 1px; line-height: 1.4;
        }
        .team-divider {
            width: 40px; height: 1px; background: var(--primary-color);
            margin: 12px 0; box-shadow: 0 0 8px rgba(0,242,255,0.5);
        }
        .team-desc { font-size: 13px; color: #999; line-height: 1.7; margin: 0; }

        /* Footer */
        footer { padding: 10px 40px; font-size: 10px; color: #444; text-align: right; border-top: 1px solid rgba(0,242,255,0.1); background: rgba(10,10,15,0.9); z-index: 10; flex-shrink: 0; }

        /* Modal */
        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 100;
            justify-content: center; align-items: center; padding: 20px;
        }
        .modal-content {
            background: var(--panel-bg); border: 1px solid var(--primary-color);
            padding: 40px; max-width: 400px; width: 100%; text-align: center;
            box-shadow: var(--border-glow); position: relative; animation: fadeIn 0.4s ease-out;
        }
        .close-btn {
            position: absolute; top: 10px; right: 15px; color: var(--primary-color);
            font-size: 24px; cursor: pointer; transition: 0.3s; background: none; border: none;
        }
        .close-btn:hover { color: #fff; text-shadow: var(--border-glow); }

        /* Zoom */
        .zoom-controls {
            position: fixed; bottom: 30px; left: 30px; z-index: 999;
            display: flex; gap: 10px;
            background: rgba(10,10,15,0.8); padding: 5px;
            border: 1px solid rgba(0,242,255,0.2); border-radius: 4px; backdrop-filter: blur(5px);
        }
        .zoom-btn {
            background: rgba(0,242,255,0.05); color: var(--primary-color);
            border: 1px solid var(--primary-color); width: 45px; height: 45px;
            font-family: 'Orbitron', sans-serif; font-size: 24px; cursor: pointer;
            transition: 0.3s; display: flex; justify-content: center; align-items: center;
        }
        .zoom-btn:hover { background: var(--primary-color); color: #000; box-shadow: 0 0 15px rgba(0,242,255,0.6); }

        /* ===== MOBILE ===== */
        @media (max-width: 768px) {
            header { padding: 12px 18px; }
            .logo { font-size: 14px; letter-spacing: 3px; }
            nav { display: none; }
            .hamburger { display: flex; }

            .content-area { padding: 16px 12px; }
            .panel { padding: 18px 14px; border-left-width: 3px; }
            h1 { font-size: 17px; letter-spacing: 1px; }

            .dash-grid { grid-template-columns: repeat(3,1fr); gap: 8px; }
            .dash-val { font-size: 12px; }
            .dash-item { padding: 10px 5px; }
            .dash-label { font-size: 8px; }

            .home-two-col { grid-template-columns: 1fr !important; gap: 15px !important; }

            .info-grid { grid-template-columns: 1fr; }
            .team-grid { grid-template-columns: 1fr; }

            .app-card { padding: 16px 14px; }
            .app-card h2 { font-size: 15px; }

            .store-btn, .tech-btn {
                font-size: 10px; padding: 10px 14px;
                display: flex; justify-content: center; align-items: center;
                text-align: center; width: 100%;
            }

            .zoom-controls { bottom: 12px; left: 12px; }
            .zoom-btn { width: 36px; height: 36px; font-size: 18px; }

            .hud-ring { display: none; }
            .hud-corner { width: 50px; height: 50px; }

            footer { padding: 8px 18px; font-size: 9px; }
            .log-window { font-size: 11px; height: 120px; }
        }

        @media (max-width: 400px) {
            .logo { font-size: 11px; letter-spacing: 2px; }
            .dash-grid { grid-template-columns: 1fr 1fr; }
        }

        /* ===== GLITCH EFFECT ===== */
        .glitch {
            position: relative;
        }
        .glitch::before,
        .glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            font-family: inherit; font-size: inherit;
            font-weight: inherit; letter-spacing: inherit;
            color: var(--primary-color);
            overflow: hidden;
            opacity: 0;
        }
        .glitch.is-glitching::before {
            opacity: 1;
            color: #ff00ff;
            animation: glitchTop 0.15s steps(1) forwards;
            clip-path: polygon(0 0, 100% 0, 100% 40%, 0 40%);
        }
        .glitch.is-glitching::after {
            opacity: 1;
            color: #00ffff;
            animation: glitchBot 0.15s steps(1) forwards;
            clip-path: polygon(0 60%, 100% 60%, 100% 100%, 0 100%);
        }
        @keyframes glitchTop {
            0%   { transform: translate(-3px, -2px); opacity: 0.8; }
            25%  { transform: translate(3px, -1px);  opacity: 0.6; }
            50%  { transform: translate(-2px, 1px);  opacity: 0.8; }
            75%  { transform: translate(2px, 2px);   opacity: 0.5; }
            100% { transform: translate(0, 0);        opacity: 0; }
        }
        @keyframes glitchBot {
            0%   { transform: translate(3px, 2px);  opacity: 0.8; }
            25%  { transform: translate(-3px, 1px); opacity: 0.6; }
            50%  { transform: translate(2px, -1px); opacity: 0.8; }
            75%  { transform: translate(-2px, -2px);opacity: 0.5; }
            100% { transform: translate(0, 0);       opacity: 0; }
        }

        /* ===== CURSOR TRAIL (desktop only) ===== */
        .cursor-dot {
            position: fixed;
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--primary-color);
            pointer-events: none;
            z-index: 99999;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 6px 2px rgba(0, 242, 255, 0.6);
            transition: opacity 0.4s ease;
        }

        /* ===== INTRO SCREEN ===== */
        #intro-screen {
            position: fixed; inset: 0; z-index: 9999;
            background: #000;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            gap: 32px;
            pointer-events: all;
        }
        #intro-screen.fade-out {
            animation: introFadeOut 1s ease-in-out forwards;
        }
        @keyframes introFadeOut {
            0%   { opacity: 1; }
            100% { opacity: 0; pointer-events: none; }
        }

        /* Pixel grid logo */
        #pixel-logo {
            position: relative;
            width: 160px; height: 160px;
        }
        #pixel-canvas {
            display: block;
            image-rendering: pixelated;
        }

        /* Scan line sweep over logo */
        #pixel-logo::after {
            content: '';
            position: absolute; top: 0; left: 0;
            width: 100%; height: 3px;
            background: rgba(0, 242, 255, 0.7);
            box-shadow: 0 0 12px 4px rgba(0, 242, 255, 0.5);
            animation: scanSweep 1.8s ease-in-out 0.3s forwards;
            opacity: 0;
        }
        @keyframes scanSweep {
            0%   { top: 0%;   opacity: 1; }
            100% { top: 100%; opacity: 0.3; }
        }

        /* Company name below logo */
        #intro-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 22px; letter-spacing: 8px;
            color: var(--primary-color);
            opacity: 0;
            animation: introNameIn 0.8s ease forwards 1.6s;
            text-shadow: 0 0 20px rgba(0, 242, 255, 0.6);
            text-transform: uppercase;
        }
        @keyframes introNameIn {
            from { opacity: 0; letter-spacing: 20px; }
            to   { opacity: 1; letter-spacing: 8px; }
        }

        /* Status line */
        #intro-status {
            font-family: 'Fira Code', monospace;
            font-size: 12px; color: #444;
            opacity: 0;
            animation: introNameIn 0.6s ease forwards 2.2s;
            letter-spacing: 2px;
        }

        /* Glow ring behind logo */
        #intro-ring {
            position: absolute;
            width: 220px; height: 220px;
            border-radius: 50%;
            border: 1px solid rgba(0, 242, 255, 0.15);
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.08), inset 0 0 30px rgba(0, 242, 255, 0.04);
            animation: ringPulse 2s ease-in-out infinite;
        }
        #intro-ring-2 {
            position: absolute;
            width: 260px; height: 260px;
            border-radius: 50%;
            border: 1px dashed rgba(0, 242, 255, 0.07);
            animation: ringPulse 2s ease-in-out 0.5s infinite, spinRing 20s linear infinite;
        }
        @keyframes ringPulse {
            0%, 100% { opacity: 0.4; }
            50%       { opacity: 1; }
        }
        @keyframes spinRing {
            100% { transform: rotate(360deg); }
        }

        #intro-wrap {
            position: relative;
            display: flex; justify-content: center; align-items: center;
        }
    </style>
</head>
<body>

    <!-- INTRO SCREEN -->
    <div id="intro-screen">
        <div id="intro-wrap">
            <div id="intro-ring"></div>
            <div id="intro-ring-2"></div>
            <div id="pixel-logo">
                <canvas id="pixel-canvas" width="160" height="160"></canvas>
            </div>
        </div>

        // Terminal
        function initInteractiveTerminal() {
            const termInput = document.getElementById('termInput');
            const logOutput = document.getElementById('logOutput');
            const logBox = document.getElementById('logBox');
            if (!termInput || !logOutput) return;

            const printLog = (text, color="#00ff00") => {
                const line = document.createElement('div');
                line.className = 'log-line'; line.style.color = color; line.innerText = text;
                logOutput.appendChild(line); logBox.scrollTop = logBox.scrollHeight;
            };

            printLog("> Boot sequence initiated...");
            setTimeout(() => printLog("> Core loaded. Type 'help' for commands."), 500);

            termInput.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    const cmd = this.value.trim().toLowerCase();
                    if (cmd === '') return;
                    printLog(`guest@sedogin:~$ ${this.value}`, "#00f2ff");
                    this.value = '';
                    switch(cmd) {
                        case 'help': printLog("Available commands: about, status, clear, join"); break;
                        case 'about': printLog("Sedogin INC - Automating the future. Developing Sedvai AI."); break;
                        case 'status':

                        case 'clear': logOutput.innerHTML = ''; break;
                        case 'join':

                            setTimeout(() => { window.location.href="mailto:sedogin@example.com?subject=Sedogin%20Recruitment"; printLog("> Email client triggered.", "yellow"); }, 800);
                            break;
                        default: printLog(`Command not recognized: '${cmd}'`, "red");
                    }
                }
            });
        }

        // ===== INTRO PIXEL ANIMATION =====
        (function() {
            const pc = document.getElementById('pixel-canvas');
            const px = pc.getContext('2d');
            const SIZE = 160;

            // S pixel map (32x32)
            // Draw S using Jacquard 24 font (same as the logo) — read pixels from canvas
            const GRID = 64;
            const offscreen = document.createElement('canvas');
            offscreen.width = GRID; offscreen.height = GRID;
            const og = offscreen.getContext('2d');

            function buildSFromFont() {
                og.clearRect(0, 0, GRID, GRID);
                og.fillStyle = '#fff';
                og.font = `${GRID * 0.85}px "Jacquard 24"`;
                og.textAlign = 'center';
                og.textBaseline = 'middle';
                og.fillText('S', GRID / 2, GRID / 2 + 2);

                const imgData = og.getImageData(0, 0, GRID, GRID).data;
                const map = [];
                for (let r = 0; r < GRID; r++) {
                    let row = '';
                    for (let c = 0; c < GRID; c++) {
                        const idx = (r * GRID + c) * 4;
                        row += imgData[idx + 3] > 60 ? '1' : '0';
                    }
                    map.push(row);
                }
                return map;
            }

            // Wait for Jacquard 24 to load, then build pixel map
            let S_MAP = [];
            document.fonts.load(`${GRID * 0.85}px "Jacquard 24"`).then(() => {
                S_MAP = buildSFromFont();
                // Rebuild pixel list after font loads
                allPixels.length = 0;
                const CS = SIZE / GRID;
                for (let r = 0; r < GRID; r++) {
                    for (let c = 0; c < GRID; c++) {
                        if (S_MAP[r] && S_MAP[r][c] === '1') {
                            allPixels.push({ r, c, revealed: false, alpha: 0 });
                        }
                    }
                }
                for (let i = allPixels.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [allPixels[i], allPixels[j]] = [allPixels[j], allPixels[i]];
                }
            });

            const allPixels = [];
            const CELL_S = SIZE / GRID;
            const REVEAL_MS = 2000;
            let startTime = null;
            let animStarted = false;

            function startPixelAnim() {
                if (animStarted) return;
                animStarted = true;
                startTime = null;
                requestAnimationFrame(drawIntro);
            }

            function drawIntro(ts) {
                if (!startTime) startTime = ts;
                const progress = Math.min((ts - startTime) / REVEAL_MS, 1);
                const targetCount = Math.floor(progress * allPixels.length);

                for (let i = 0; i < targetCount; i++) {
                    if (!allPixels[i].revealed) allPixels[i].revealed = true;
                }

                px.clearRect(0, 0, SIZE, SIZE);
                for (let i = 0; i < allPixels.length; i++) {
                    const p = allPixels[i];
                    if (!p.revealed) continue;
                    p.alpha = Math.min(p.alpha + 0.1, 1);
                    px.fillStyle = `rgba(0, 200, 255, ${p.alpha * 0.9})`;
                    px.fillRect(p.c * CELL_S + 0.5, p.r * CELL_S + 0.5, CELL_S - 1, CELL_S - 1);
                    px.fillStyle = `rgba(190, 245, 255, ${p.alpha * 0.35})`;
                    px.fillRect(p.c * CELL_S + CELL_S * 0.25, p.r * CELL_S + CELL_S * 0.25, CELL_S * 0.5, CELL_S * 0.5);
                }

                if (progress < 1) requestAnimationFrame(drawIntro);
            }

            // Start as soon as font is ready (or after short fallback)
            document.fonts.ready.then(startPixelAnim);
            setTimeout(startPixelAnim, 300);

            // Dismiss after 4.2s
            setTimeout(() => {
                const screen = document.getElementById('intro-screen');
                screen.classList.add('fade-out');
                setTimeout(() => { screen.style.display = 'none'; }, 1000);
            }, 4200);
        })();

        window.onload = () => {
            const savedTab = localStorage.getItem('sedogin_active_tab') || 'main';
            showSection(savedTab);
        };

        // Particles
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        let particles = [];

        class Particle {
            constructor() {
                this.x = Math.random()*canvas.width; this.y = Math.random()*canvas.height;
                this.vx = (Math.random()-0.5)*0.4; this.vy = (Math.random()-0.5)*0.4;
            }
            update() {
                this.x+=this.vx; this.y+=this.vy;
                if(this.x<0||this.x>canvas.width) this.vx*=-1;
                if(this.y<0||this.y>canvas.height) this.vy*=-1;
            }
            draw() {
                ctx.fillStyle='rgba(0,242,255,0.3)';
                ctx.beginPath(); ctx.arc(this.x,this.y,1.5,0,Math.PI*2); ctx.fill();
            }
        }

        for(let i=0;i<70;i++) particles.push(new Particle());

        function animate() {
            ctx.clearRect(0,0,canvas.width,canvas.height);
            particles.forEach((p,i) => {
                p.update(); p.draw();
                for(let j=i+1;j<particles.length;j++) {
                    const d=Math.sqrt((p.x-particles[j].x)**2+(p.y-particles[j].y)**2);
                    if(d<120) {
                        ctx.strokeStyle=`rgba(0,242,255,${0.1*(1-d/120)})`;
                        ctx.lineWidth=0.5;
                        ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(particles[j].x,particles[j].y); ctx.stroke();
                    }
                }
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => { canvas.width=window.innerWidth; canvas.height=window.innerHeight; });
        animate();

        // ===== CURSOR TRAIL (desktop only) =====
        const isTouchDevice = () => window.matchMedia('(hover: none)').matches;

        if (!isTouchDevice()) {
            const TRAIL_COUNT = 12;
            const dots = [];

            for (let i = 0; i < TRAIL_COUNT; i++) {
                const dot = document.createElement('div');
                dot.classList.add('cursor-dot');
                dot.style.opacity = (1 - i / TRAIL_COUNT) * 0.7;
                dot.style.width  = Math.max(2, 6 - i * 0.35) + 'px';
                dot.style.height = dot.style.width;
                document.body.appendChild(dot);
                dots.push({ el: dot, x: -100, y: -100 });
            }

            let mouseX = -100, mouseY = -100;

            window.addEventListener('mousemove', e => {
                mouseX = e.clientX;
                mouseY = e.clientY;
            });

            (function trailLoop() {
                let x = mouseX, y = mouseY;
                dots.forEach((dot, i) => {
                    dot.el.style.left = x + 'px';
                    dot.el.style.top  = y + 'px';
                    const prev = dots[i] || { x, y };
                    dot.x += (x - dot.x) * (0.35 - i * 0.02);
                    dot.y += (y - dot.y) * (0.35 - i * 0.02);
                    dot.el.style.left = dot.x + 'px';
                    dot.el.style.top  = dot.y + 'px';
                    x = dot.x; y = dot.y;
                });
                requestAnimationFrame(trailLoop);
            })();
        }

        // ===== GLITCH ON H1 =====
        function applyGlitchToH1() {
            const h1 = document.querySelector('#content-display h1');
            if (!h1 || h1.classList.contains('glitch')) return;
            h1.classList.add('glitch');
            h1.setAttribute('data-text', h1.textContent);
        }

        function triggerGlitch() {
            const h1 = document.querySelector('#content-display h1');
            if (!h1) return;
            h1.classList.add('is-glitching');
            setTimeout(() => h1.classList.remove('is-glitching'), 200);
        }

        // Re-apply glitch class whenever section changes
        const _origShow = showSection;
        window.showSection = function(name) {
            _origShow(name);
            // After DOM update (200ms fade) + small buffer
            setTimeout(() => {
                applyGlitchToH1();
                // First immediate glitch
                setTimeout(triggerGlitch, 100);
            }, 350);
        };

        // Random glitch interval — less frequent on mobile
        const glitchInterval = isTouchDevice() ? [6000, 14000] : [3500, 9000];
        function scheduleGlitch() {
            const delay = glitchInterval[0] + Math.random() * (glitchInterval[1] - glitchInterval[0]);
            setTimeout(() => {
                triggerGlitch();
                scheduleGlitch();
            }, delay);
        }
        scheduleGlitch();
    </script>
