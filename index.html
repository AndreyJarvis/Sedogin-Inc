<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEDOGIN INC. | Global System Interface</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #00f2ff;
            --glow-secondary: #00d2ee;
            --bg-dark: #0a0a0b;
            --panel-bg: rgba(10, 10, 15, 0.95);
            --border-glow: 0 0 15px rgba(0, 242, 255, 0.4);
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg-dark);
            color: white;
            overflow: hidden;
        }

        #bg-canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: -1;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0d0d0f; }
        ::-webkit-scrollbar-thumb { background: rgba(0, 242, 255, 0.2); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary-color); box-shadow: var(--border-glow); }

        .main-frame {
            display: flex;
            flex-direction: column;
            height: 100vh;
            border: 1px solid rgba(0, 242, 255, 0.1);
            box-sizing: border-box;
            backdrop-filter: blur(3px);
        }

        header {
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0, 242, 255, 0.2);
            background: rgba(10, 10, 15, 0.8);
            flex-shrink: 0;
        }

        .logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 22px;
            font-weight: bold;
            letter-spacing: 5px;
            color: var(--primary-color);
            text-shadow: var(--border-glow);
        }

        nav { display: flex; gap: 20px; }

        .nav-btn {
            background: none;
            border: 1px solid transparent;
            color: #777;
            padding: 8px 15px;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            font-size: 12px;
            letter-spacing: 1px;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .nav-btn.active {
            color: var(--primary-color);
            border-bottom: 2px solid var(--primary-color);
            text-shadow: var(--border-glow);
        }

        .nav-btn:hover:not(.active) { color: white; }

        .content-area {
            flex-grow: 1;
            padding: 40px;
            overflow-y: auto;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .panel {
            background: var(--panel-bg);
            border: 1px solid rgba(0, 242, 255, 0.1);
            border-left: 4px solid var(--primary-color);
            padding: 40px;
            max-width: 900px;
            width: 100%;
            box-shadow: var(--border-glow);
            animation: fadeIn 0.6s ease-out;
            position: relative;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 { font-family: 'Orbitron', sans-serif; color: var(--primary-color); margin-top: 0; font-size: 26px; }
        p { line-height: 1.8; color: #ccc; }

        /* Information Grid */
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 30px;
        }

        /* Accordion Style */
        details {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(0, 242, 255, 0.1);
            border-radius: 4px;
            padding: 15px;
            transition: 0.3s;
        }

        details[open] {
            border-color: var(--primary-color);
            background: rgba(0, 242, 255, 0.02);
        }

        summary {
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            color: var(--primary-color);
            cursor: pointer;
            list-style: none;
            outline: none;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        summary::-webkit-details-marker { display: none; }

        .legal-text {
            margin-top: 15px;
            font-size: 13px;
            color: #aaa;
            white-space: pre-line;
            max-height: 300px;
            overflow-y: auto;
            padding-right: 10px;
        }

        footer {
            padding: 10px 40px;
            font-size: 10px;
            color: #444;
            text-align: right;
            border-top: 1px solid rgba(0, 242, 255, 0.1);
            background: rgba(10, 10, 15, 0.9);
        }

        .status-dot {
            height: 7px;
            width: 7px;
            background-color: #00ff00;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
            box-shadow: 0 0 8px #00ff00;
        }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="main-frame">
        <header>
            <div class="logo">SEDOGIN INC.</div>
            <nav>
                <button class="nav-btn active" onclick="showSection('main')">Home</button>
                <button class="nav-btn" onclick="showSection('tech')">Technology</button>
                <button class="nav-btn" onclick="showSection('info')">Information</button>
            </nav>
        </header>

        <main class="content-area">
            <section id="content-display" class="panel">
                <h1>SYSTEM INITIALIZATION...</h1>
                <p>Welcome to the Sedogin INC. central command hub. We bridge the gap between advanced AI integration, automation, and long-term technological strategy.</p>
                <div style="margin-top: 20px;">
                    <span class="status-dot"></span> System Active: Core v1.2 | English Build
                </div>
            </section>
        </main>

        <footer>
            © 2026 SEDOGIN INC. | ALL RIGHTS RESERVED
        </footer>
    </div>

    <script>
        const sections = {
            main: {
                title: "SEDOGIN INC. CORE",
                content: `<p>Welcome to the central project management interface. This hub serves as the nexus for our development tracks, financial planning, and strategic AI deployment.</p>
                          <div style="margin-top: 20px;"><span class="status-dot"></span> Core System Operational</div>`
            },
            tech: {
                title: "TECHNICAL TRACK",
                content: `<p>Cutting-edge development sector. We specialize in high-performance AI integration, architectural web design, and system-wide automation protocols. All technical assets and codebases are managed within this sector.</p>
                          <div style="margin-top: 20px;"><span class="status-dot"></span> Tech Sector Online</div>`
            },
            info: {
                title: "INFORMATION HUB",
                content: `<p>Official documentation and legal compliance directory for Sedogin INC. projects.</p>
                <div class="info-grid">
                    <details>
                        <summary>Privacy Policy</summary>
                        <div class="legal-text">
                            Privacy Policy for Sedvai (by Sedogin INC)
                            Last Updated: March 2026

                            1. Overview
                            Sedogin INC ("we," "our," or "us") is committed to protecting your privacy. This Privacy Policy explains how Sedvai collects and uses information when you use our application and website.

                            2. Data Collection
                            - Local Processing: Sedvai is designed to process voice commands and scripts locally on your device. We do not upload your private voice recordings to our servers.
                            - System Access: To function, Sedvai requires access to your microphone and system controls (volume, brightness, applications). This access is used strictly to execute your commands.
                            - Analytics: We may collect anonymous technical data (e.g., app version, crash reports) to improve performance. This data does not identify you personally.

                            3. Third-Party Services
                            If you connect external AI models (like OpenAI or Groq) via API keys, your data is subject to the privacy policies of those providers. Sedogin INC does not store your API keys on its own servers; they are stored locally in your encrypted app settings.

                            4. Your Rights
                            You have the right to revoke microphone and system permissions at any time through your Windows settings.
                        </div>
                    </details>
                    <details>
                        <summary>Terms of Use</summary>
                        <div class="legal-text">
                            Terms of Service for Sedvai (by Sedogin INC)
                            Last Updated: March 2026

                            1. Overview
                            Sedogin INC ("we," "our," or "us") is committed to protecting your privacy. This Privacy Policy explains how Sedvai collects and uses information when you use our application and website.

                            2. Data Collection
                            - Local Processing: Sedvai is designed to process voice commands and scripts locally on your device. We do not upload your private voice recordings to our servers.
                            - System Access: To function, Sedvai requires access to your microphone and system controls (volume, brightness, applications). This access is used strictly to execute your commands.
                            - Analytics: We may collect anonymous technical data (e.g., app version, crash reports) to improve performance. This data does not identify you personally.

                            3. Third-Party Services
                            If you connect external AI models (like OpenAI or Groq) via API keys, your data is subject to the privacy policies of those providers. Sedogin INC does not store your API keys on its own servers; they are stored locally in your encrypted app settings.

                            4. Your Rights
                            You have the right to revoke microphone and system permissions at any time through your Windows settings.
                        </div>
                    </details>
                </div>`
            }
        };

        function showSection(name) {
            const data = sections[name];
            const display = document.getElementById('content-display');
            
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('active');
                if(btn.innerText.toLowerCase() === name) btn.classList.add('active');
                if(name === 'main' && btn.innerText.toLowerCase() === 'home') btn.classList.add('active');
            });

            display.style.opacity = 0;
            setTimeout(() => {
                display.innerHTML = `<h1>${data.title}</h1>${data.content}`;
                display.style.opacity = 1;
                document.querySelector('.content-area').scrollTop = 0;
            }, 200);
        }

        // Particle Background
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        let particles = [];
        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = (Math.random() - 0.5) * 0.5;
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
                if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
            }
            draw() {
                ctx.fillStyle = 'rgba(0, 242, 255, 0.4)';
                ctx.beginPath(); ctx.arc(this.x, this.y, 1.5, 0, Math.PI * 2); ctx.fill();
            }
        }
        for (let i = 0; i < 80; i++) particles.push(new Particle());
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, i) => {
                p.update(); p.draw();
                for (let j = i; j < particles.length; j++) {
                    const d = Math.sqrt((p.x - particles[j].x)**2 + (p.y - particles[j].y)**2);
                    if (d < 100) {
                        ctx.strokeStyle = `rgba(0, 242, 255, ${0.1 * (1 - d/100)})`;
                        ctx.lineWidth = 0.5;
                        ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(particles[j].x, particles[j].y); ctx.stroke();
                    }
                }
            });
            requestAnimationFrame(animate);
        }
        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
        animate();
    </script>
</body>
</html>
